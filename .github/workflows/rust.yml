name: Rust Tauri CI

on:
    push:
        branches: '*'

concurrency:
    group: ${{ github.ref }}
    cancel-in-progress: true

jobs:
    Testing_workflow:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  clean: true

            - name: Install Dependencies
              run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev libjavascriptcoregtk-4.1-dev librsvg2-dev build-essential libsoup-3.0-dev

            - name: Set up Rust
              uses: actions-rs/toolchain@v1
              with:
                  profile: minimal
                  toolchain: stable
                  override: true
                  components: rustfmt, clippy

            - name: Clean build cache
              run: |
                  cd src-tauri
                  cargo clean

            - name: Run tests
              run: |
                  cd src-tauri
                  cargo test -- --test-threads=1

            - name: Run linter
              run: |
                  cd src-tauri
                  cargo clippy

    Frontend_workflow:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  clean: true

            - name: Set up Node.js
              uses: actions/setup-node@v2
              with:
                  node-version: '18'

            - name: Install NPM dependencies
              run: npm install
              working-directory: ./

            - name: Run frontend linter
              run: npm run lint
              working-directory: ./
