name: Rust Tauri CI

on:
    push:
        branches: '*'

concurrency:
    group: ${{ github.ref }}
    cancel-in-progress: true

jobs:
    Testing_workflow:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v2

            - name: Install Dependencies
              run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libsoup2.4-dev javascriptcoregtk-4.0 webkit2gtk-4.0

            - name: Set up Rust
              uses: actions-rs/toolchain@v1
              with:
                  profile: minimal
                  toolchain: stable
                  override: true
                  components: rustfmt, clippy

            - name: Run tests
              run: |
                  cd src-tauri
                  cargo test -- --test-threads=1

            - name: Run linter
              run: |
                  cd src-tauri
                  cargo clippy

    Frontend_workflow:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v2

            - name: Set up Node.js
              uses: actions/setup-node@v2
              with:
                  node-version: '18'

            - name: Install NPM dependencies
              run: npm install
              working-directory: ./

            - name: Run frontend linter
              run: npm run lint
              working-directory: ./
