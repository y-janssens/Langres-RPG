name: Rust Tauri CI

on:
    push:
        branches: '*'

jobs:
    Testing_workflow:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v2

            - name: Install Dependencies
              run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libsoup2.4-dev javascriptcoregtk-4.0 webkit2gtk-4.0

            - name: Set up Rust
              uses: actions-rs/toolchain@v1
              with:
                  profile: minimal
                  toolchain: stable
                  override: true
                  components: rustfmt, clippy

            - name: Run tests
              run: |
                  cd src-tauri
                  cargo test --verbose

            - name: Run linter
              run: |
                  cd src-tauri
                  cargo clippy
