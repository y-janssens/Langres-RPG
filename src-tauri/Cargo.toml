[package]
name = "langres"
version = "0.0.1"
description = "Isometric medieval RPG game"
authors = ["Y.janssens"]
license = ""
repository = "https://github.com/y-janssens/Langres-RPG"
edition = "2021"

[build-dependencies]
tauri-build = { version = "1.5", features = [] }

[dependencies]
chrono = "^0.4.38"
diesel = { version = "2.2.2", features = ["sqlite", "r2d2"] }
rand = "0.8.5"
tauri = { version = "1.7", features = ["api-all"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
round = "0.1.2"
r2d2 = "0.8.10"
diesel_migrations = { version = "2.2.0", features = ["sqlite"] }
lazy_static = "1.5.0"
noise = "0.8.2"
dotenv = "0.15.0"
ucfirst = "0.2.2"
uuid = { version = "1.10.0", features = ["serde", "v4"] }
magic-crypt = "4.0.1"


[features]
# this feature is used for production builds or when `devPath` points to the filesystem
# DO NOT REMOVE!!
custom-protocol = ["tauri/custom-protocol"]
