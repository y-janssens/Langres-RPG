[package]
name = "langres"
version = "0.0.0"
description = ""
authors = ["Y.janssens"]
license = "test"
repository = "https://github.com/y-janssens/game"
edition = "2021"

[build-dependencies]
tauri-build = { version = "1.4", features = [] }

[dependencies]
chrono = "0.4.26"
diesel = { version = "2.1.0", features = ["sqlite", "r2d2"] }
rand = "0.8.5"
tauri = { version = "1.4", features = ["api-all"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
round = "0.1.2"
r2d2 = "0.8.10"
rusqlite = { version = "0.29", features = ["bundled"] }
diesel_migrations = { version = "2.1.0", features = ["sqlite"] }
lazy_static = "1.4.0"
noise = "0.8.2"
dotenv = "0.15.0"


[features]
# this feature is used for production builds or when `devPath` points to the filesystem
# DO NOT REMOVE!!
custom-protocol = ["tauri/custom-protocol"]
